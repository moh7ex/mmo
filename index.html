    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Google Fonts Cairo & JetBrains Mono -->
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Cairo', 'sans-serif'],
                        mono: ['JetBrains Mono', 'monospace'],
                    }
                }
            }
        }
    </script>
    <style>
        body {
            background-color: #020204;
            color: #f3f4f6;
            overflow-x: hidden;
            transition: background-color 0.5s ease;
        }
        ::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }
        ::-webkit-scrollbar-track {
            background: #020204;
        }
        ::-webkit-scrollbar-thumb {
            background: #1e2230;
            border-radius: 10px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: var(--accent-color, #1ed760);
        }
        .animate-spin-slow {
            animation: spin 15s linear infinite;
        }
        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body class="font-sans antialiased min-h-screen flex flex-col justify-between selection:bg-white/10 selection:text-white">

    <!-- Ambient Glowing Background -->
    <div id="ambient-glow" class="absolute top-0 left-1/2 -translate-x-1/2 w-[1000px] h-[300px] rounded-full opacity-25 blur-[150px] pointer-events-none transition-all duration-1000" style="background-color: var(--accent-color, #1ed760);"></div>

    <!-- MAIN APP CONTAINER -->

            <div class="flex flex-col gap-1 text-right" id="brand-header">
                <h1 class="text-3xl font-extrabold tracking-tight flex items-center gap-2.5">

                    <span id="txt-app-title">كوانتوم ميديا</span>
                </h1>
                <p class="text-xs text-gray-400" id="txt-app-subtitle">نظام تشغيل وإدارة الموسيقى محلياً عالي الجودة والأداء</p>

            <!-- Global Lang & System Status -->

                    <span class="w-1.5 h-1.5 rounded-full bg-green-400 animate-pulse"></span>
                    <span id="txt-sys-ready">جاهز محلياً</span>
                </span>
                <span class="text-gray-700">|</span>
                <button onclick="toggleLang()" class="hover:text-white font-bold transition-colors cursor-pointer text-gray-300" id="btn-lang-toggle">English</button>
            </div>
        </header>

        <!-- DYNAMIC NAVIGATION RAIL (TABS SYSTEM) -->
        <div class="sticky top-4 z-40 bg-[#0c0c14]/80 backdrop-blur-2xl border border-white/10 shadow-2xl p-2 rounded-3xl mb-8 flex gap-2 overflow-x-auto" id="nav-rail">
            <!-- Rendered dynamically -->
        </div>

        <!-- MAIN VIEW PORT -->
        <main class="min-h-[480px] flex-1 flex flex-col" id="view-viewport">
            <!-- View contents will be rendered dynamically by active view controller -->
        </main>

        <!-- GLOBAL TOAST NOTIFICATION -->
        <div id="toast-container" class="fixed top-6 left-1/2 -translate-x-1/2 z-[9999] hidden flex items-center gap-3 bg-[#0a0a0f]/95 border border-white/10 px-5 py-3 rounded-2xl shadow-2xl backdrop-blur-2xl text-xs font-semibold select-none">
            <span id="toast-message"></span>
            <button id="toast-undo" class="hidden items-center gap-1.5 hover:brightness-110 active:scale-95 transition-all text-gray-300 mr-2 border-r border-white/10 pr-2.5">
                <i data-lucide="undo2" class="w-3.5 h-3.5"></i>
                <span id="txt-toast-undo">تراجع</span>
            </button>
        </div>

        <!-- MINI PLAYER FIXED BAR -->
        <div id="mini-player" class="fixed bottom-4 left-1/2 -translate-x-1/2 w-[calc(100%-2rem)] max-w-6xl z-50 bg-[#08080c]/90 border border-white/10 backdrop-blur-2xl rounded-3xl px-6 py-4 flex items-center justify-between gap-6 shadow-2xl transition-all duration-300 hidden">
            <div class="flex items-center gap-3.5 flex-1 min-w-0" onclick="switchView('studio')">
                <div class="w-11 h-11 rounded-2xl bg-white/5 border border-white/10 flex items-center justify-center relative overflow-hidden group cursor-pointer shadow-lg">
                    <img id="mini-cover" class="w-full h-full object-cover hidden referrerPolicy='no-referrer'">
                    <div id="mini-placeholder-icon" class="flex items-center justify-center text-white"><i data-lucide="music" class="w-5 h-5"></i></div>
                </div>
                <div class="cursor-pointer min-w-0">
                    <h4 id="mini-title" class="text-xs font-bold text-white truncate"></h4>
                    <p id="mini-artist" class="text-[10px] text-gray-400 mt-0.5 truncate"></p>
                </div>
            </div>
            
            <div class="flex items-center gap-4">
                <button onclick="playbackPrev()" class="text-gray-400 hover:text-white transition-all active:scale-90 p-1"><i data-lucide="skip-back" class="w-4 h-4"></i></button>
                <button onclick="playbackToggle()" id="mini-btn-play" class="w-10 h-10 rounded-full flex items-center justify-center text-black transition-all active:scale-95 shadow-md"><i data-lucide="play" class="w-4 h-4 fill-black ml-0.5"></i></button>
                <button onclick="playbackNext()" class="text-gray-400 hover:text-white transition-all active:scale-90 p-1"><i data-lucide="skip-forward" class="w-4 h-4"></i></button>
            </div>
        </div>

        <!-- FOOTER -->
        <footer class="mt-16 border-t border-white/5 pt-6 flex flex-col sm:flex-row items-center justify-between gap-4 text-xs text-gray-500">
            <span id="txt-footer-copy">© 2026 كوانتوم ميديا (Quantum Core). جميع الحقوق محفوظة.</span>
            <div class="flex items-center gap-4 flex-wrap">
                <button onclick="toggleDebugMode()" id="btn-debug-toggle" class="flex items-center gap-1.5 px-3 py-1.5 rounded-xl border border-white/5 bg-white/5 text-gray-400 hover:text-gray-300 transition-all active:scale-95 font-semibold text-[10px]">
                    <i data-lucide="terminal" class="w-3 h-3"></i>
                    <span id="txt-debug-btn">أدوات المطور (Debug)</span>
                </button>
                <div id="perf-indicator" class="hidden items-center gap-3 font-mono text-[10px] bg-amber-500/10 border border-amber-500/20 text-amber-400 px-3 py-1.5 rounded-xl">
                    <span>STATE: <span id="perf-state">offline</span></span>
                    <span>LATENCY: <span id="perf-lat">0</span>ms</span>
                    <span>FPS: <span id="perf-fps">0</span></span>
                    <span>DROPS: <span id="perf-drops">0</span></span>
                </div>
            </div>
        </footer>
    </div>

        // INDEXEDDB DATABASE INTEGRATION (Mirrors QuantumAudioCoreDB exactly!)
        const DB_NAME = "QuantumAudioCoreDB";
        const DB_VERSION = 2;
        let db = null;

        function initDatabase() {
            return new Promise((resolve) => {
                const request = indexedDB.open(DB_NAME, DB_VERSION);
                request.onupgradeneeded = (e) => {
                    const d = request.result;
                    if (!d.objectStoreNames.contains("tracks_metadata")) {
                        d.createObjectStore("tracks_metadata", { keyPath: "id", autoIncrement: true });
                    }
                    if (!d.objectStoreNames.contains("tracks_blobs")) {
                        d.createObjectStore("tracks_blobs", { keyPath: "id" });
                    }
                    if (!d.objectStoreNames.contains("playlists")) {
                        d.createObjectStore("playlists", { keyPath: "id" });
                    }
                    if (!d.objectStoreNames.contains("settings")) {
                        d.createObjectStore("settings", { keyPath: "key" });
                    }
                };
                request.onsuccess = () => {
                    db = request.result;
                    resolve();
                };
                request.onerror = () => {
                    console.error("IDB failed");
                    resolve();
                };
            });
        }

        function dbGetSetting(key) {
            return new Promise((resolve) => {
                if (!db) return resolve(null);
                const tx = db.transaction("settings", "readonly");
                const req = tx.objectStore("settings").get(key);
                req.onsuccess = () => resolve(req.result ? req.result.value : null);
                req.onerror = () => resolve(null);
            });
        }

        function dbSetSetting(key, value) {
            return new Promise((resolve) => {
                if (!db) return resolve();
                const tx = db.transaction("settings", "readwrite");
                tx.objectStore("settings").put({ key, value });
                tx.oncomplete = () => resolve();
            });
        }

        function dbGetTracks() {
            return new Promise((resolve) => {
                if (!db) return resolve([]);
                const tx = db.transaction("tracks_metadata", "readonly");
                const req = tx.objectStore("tracks_metadata").getAll();
                req.onsuccess = () => resolve(req.result || []);
                req.onerror = () => resolve([]);
            });
        }

        function dbGetTrackBlob(id) {
            return new Promise((resolve) => {
                if (!db) return resolve(null);
                const tx = db.transaction("tracks_blobs", "readonly");
                const req = tx.objectStore("tracks_blobs").get(id);
                req.onsuccess = () => resolve(req.result || null);
                req.onerror = () => resolve(null);
            });
        }

        function dbAddTrack(metadata, audioBlob, coverBlob) {
            return new Promise((resolve) => {
                if (!db) return resolve(Date.now());
                const tx = db.transaction(["tracks_metadata", "tracks_blobs"], "readwrite");
                const mdStore = tx.objectStore("tracks_metadata");
                const blobStore = tx.objectStore("tracks_blobs");
                
                const addReq = mdStore.add(metadata);
                addReq.onsuccess = () => {
                    const id = addReq.result;
                    blobStore.add({ id, audioBlob, coverBlob });
                };
                tx.oncomplete = () => resolve();
            });
        }

        function dbUpdateTrack(id, updates) {
            return new Promise((resolve) => {
                if (!db) return resolve();
                const tx = db.transaction("tracks_metadata", "readwrite");
                const store = tx.objectStore("tracks_metadata");
                const req = store.get(id);
                req.onsuccess = () => {
                    if (req.result) {
                        store.put({ ...req.result, ...updates });
                    }
                };
                tx.oncomplete = () => resolve();
            });
        }

        function dbDeleteTrack(id) {
            return new Promise((resolve) => {
                if (!db) return resolve();
                const tx = db.transaction(["tracks_metadata", "tracks_blobs"], "readwrite");
                tx.objectStore("tracks_metadata").delete(id);
                tx.objectStore("tracks_blobs").delete(id);
                tx.oncomplete = () => resolve();
            });
        }

        let audioCtx = null;

        // Equalizer & Visualizer nodes
        let eqBands = [];

        function initWebAudio() {
            if (audioCtx) return;
            try {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                audioSource = audioCtx.createMediaElementSource(audioNode);
                
                // 3 bands equalizer peaking filters
                const freqs = [100, 1000, 8000];
                let lastNode = audioSource;
                eqBands = freqs.map((f, i) => {
                    const filter = audioCtx.createBiquadFilter();
                    filter.type = i === 0 ? "lowshelf" : i === 2 ? "highshelf" : "peaking";
                    filter.frequency.value = f;
                    filter.Q.value = 1.0;
                    filter.gain.value = i === 0 ? 4 : i === 1 ? 0 : 2; // match defaults
                    lastNode.connect(filter);
                    lastNode = filter;
                    return filter;
                });

                analyser = audioCtx.createAnalyser();
                analyser.fftSize = 256;
                lastNode.connect(analyser);
                analyser.connect(audioCtx.destination);
                
                startPerfMonitoring();
            } catch (err) {
                console.error("WebAudio failed to start", err);
            }
        }

        // FULL CONTROL ACTIONS
        async function playTrack(track) {
            if (synthInterval) {
                clearInterval(synthInterval);
                synthInterval = null;
            }

            if (track.id < 0) {
                playSyntheticTrack(track);
                showToast(`${translations[state.lang].playing_sample}: ${track.title}`);
                return;
            }

            try {
                initWebAudio();
                const blobObj = await dbGetTrackBlob(track.id);
                if (blobObj && blobObj.audioBlob) {
                    const url = URL.createObjectURL(blobObj.audioBlob);
                    audioNode.src = url;
                    state.currentTrack = track;
                    
                    audioNode.play().then(() => {
                        state.isPlaying = true;
                        showMiniPlayer();
                        updateVinylDiscUI(true);
                        logHistory(track);
                        switchView("studio");
                    }).catch(e => {
                        console.error("Autoplay fail", e);
                        playSyntheticTrack(track); // Fallback
                    });
                } else {
                    // Fallback
                    playSyntheticTrack(track);
                }
            } catch (err) {
                console.error(err);
                playSyntheticTrack(track);
            }
        }

        function startPerfMonitoring() {
            function loop(timestamp) {
                if (lastFrameTime) {
                    const elapsed = timestamp - lastFrameTime;
                    fpsCounter++;
                    if (elapsed > 25) { // drop frame (greater than 16.6ms target)
                        frameDrops++;
                    }
                }
                lastFrameTime = timestamp;
                requestAnimationFrame(loop);
            }
            requestAnimationFrame(loop);

            setInterval(() => {
                fps = fpsCounter;
                fpsCounter = 0;
                
                const stateEl = document.getElementById("perf-state");
                const latEl = document.getElementById("perf-lat");
                const fpsEl = document.getElementById("perf-fps");
                const dropsEl = document.getElementById("perf-drops");

                if (stateEl) stateEl.innerText = audioCtx ? audioCtx.state : "offline";
                if (latEl) latEl.innerText = audioCtx ? Math.round((audioCtx.baseLatency || 0.005) * 1000) : "0";
                if (fpsEl) fpsEl.innerText = fps;
                if (dropsEl) dropsEl.innerText = frameDrops;
                
                frameDrops = 0;
            }, 1000);
        }

        function toggleDebugMode() {
            state.isDebugMode = !state.isDebugMode;
            const perf = document.getElementById("perf-indicator");
            const btn = document.getElementById("btn-debug-toggle");
            const txt = document.getElementById("txt-debug-btn");

            if (state.isDebugMode) {
                perf.classList.remove("hidden");
                perf.classList.add("flex");
                btn.className = "flex items-center gap-1.5 px-3 py-1.5 rounded-xl border border-amber-500/20 bg-amber-500/10 text-amber-400 font-semibold text-[10px]";
                txt.innerText = translations[state.lang].footer_debug_active;
                showToast(translations[state.lang].toast_developer_active);
            } else {
                perf.classList.add("hidden");
                perf.classList.remove("flex");
                btn.className = "flex items-center gap-1.5 px-3 py-1.5 rounded-xl border border-white/5 bg-white/5 text-gray-400 hover:text-gray-300 transition-all font-semibold text-[10px]";
                txt.innerText = translations[state.lang].footer_debug_btn;
                showToast(translations[state.lang].toast_developer_inactive);
            }
            dbSetSetting("isDebugMode", state.isDebugMode);
        }

        // RELIABLE TOASTS SYSTEM
        function showToast(message, duration = 3000) {
            const toast = document.getElementById("toast-container");
            const msg = document.getElementById("toast-message");
            if (toast && msg) {
                msg.innerText = message;
                toast.classList.remove("hidden");
                toast.classList.add("flex");
                setTimeout(() => {
                    toast.classList.add("hidden");
                    toast.classList.remove("flex");
                }, duration);
            }
        }

        // FULL SEARCH & FILTER ENGINE FOR LIBRARY
        function updateFilteredTracks() {
            let list = [...state.tracks];
            
            if (state.activePlaylistId === "favorites") {
                list = list.filter(t => t.isFavorite || state.favorites.has(t.id));
            } else if (state.activePlaylistId === "recently-played") {
                list = [...state.tracks].filter(t => t.lastPlayed).sort((a,b) => b.lastPlayed - a.lastPlayed);
            } else if (state.activePlaylistId === "most-played") {
                list = [...state.tracks].filter(t => t.playCount > 0).sort((a,b) => b.playCount - a.playCount);
            } else if (state.activePlaylistId !== "all") {
                const pl = state.playlists.find(p => p.id === state.activePlaylistId);
                if (pl) {
                    const idSet = new Set(pl.trackIds);
                    list = list.filter(t => idSet.has(t.id));
                }
            }

            if (state.searchQuery.trim()) {
                const q = state.searchQuery.toLowerCase();
                list = list.filter(t => 
                    t.title.toLowerCase().includes(q) || 
                    (t.artist && t.artist.toLowerCase().includes(q)) ||
                    (t.album && t.album.toLowerCase().includes(q)) ||
                    (t.genre && t.genre.toLowerCase().includes(q))
                );
            }

            state.filteredTracks = list;
            renderActiveViewContent();
        }

        // PLAYLIST HELPER RENDERERS
        function renderPlaylistDetails() {
            const pl = state.playlists.find(p => p.id === state.activePlaylistId);
            if (!pl) return '';
            
            const t = translations[state.lang];
            const tracksInPl = state.tracks.filter(t => pl.trackIds.includes(t.id));

            return `
                <div class="flex-1 flex flex-col justify-between">
                    <div>
                        <div class="flex justify-between items-start border-b border-white/5 pb-4 mb-4">
                            <div>

                                <p class="text-xs text-gray-400 mt-1">${pl.description || t.pl_songs_empty}</p>
                            </div>
                            <button onclick="playPlaylistDirectly('${pl.id}')" class="flex items-center gap-1.5 px-4 py-2 rounded-xl text-xs font-bold transition-all active:scale-95" style="background-color: ${state.accentColor}; color: #000;">
                                <i data-lucide="play" class="w-3.5 h-3.5 fill-black"></i> ${t.pl_play_list}
                            </button>
                        </div>

                        <div class="flex flex-col gap-2.5 max-h-64 overflow-y-auto">
                            ${tracksInPl.map(track => `
                                <div class="flex items-center justify-between p-2.5 rounded-xl bg-white/5 border border-white/5 hover:border-white/10 transition-all">
                                    <div class="flex items-center gap-2.5 min-w-0 flex-1">
                                        <span class="text-[10px] font-mono text-gray-500">🎧</span>
                                        <div class="min-w-0">
                                            <h4 class="text-xs font-bold text-white truncate">${track.title}</h4>
                                            <p class="text-[9px] text-gray-400 truncate">${track.artist || ''}</p>
                                        </div>
                                    </div>
                                    <button onclick="removeTrackFromPlaylist('${pl.id}', ${track.id})" class="text-gray-500 hover:text-red-500 p-1"><i data-lucide="minus-circle" class="w-3.5 h-3.5"></i></button>
                                </div>
                            `).join("")}
                            ${!tracksInPl.length ? `<p class="text-xs text-gray-500 text-center py-8">${t.pl_empty_tracks}</p>` : ''}
                        </div>
                    </div>
                </div>
            `;
        }

        // LOGIC COMPONENT DRIVERS
        function searchLibrary(val) {
            state.searchQuery = val;
            updateFilteredTracks();
        }

        function setLibraryPlaylistFilter(filterId) {
            state.activePlaylistId = filterId;
            updateFilteredTracks();
        }

        async function toggleFavorite(trackId) {
            const track = state.tracks.find(t => t.id === trackId);
            if (!track) return;
            const isFav = !track.isFavorite;
            track.isFavorite = isFav;
            if (isFav) state.favorites.add(trackId);
            else state.favorites.delete(trackId);

            await dbUpdateTrack(trackId, { isFavorite: isFav });
            updateFilteredTracks();
        }

        async function deleteTrack(trackId) {
            await dbDeleteTrack(trackId);
            state.tracks = state.tracks.filter(t => t.id !== trackId);
            
            if (state.currentTrack?.id === trackId) {
                state.currentTrack = null;
                state.isPlaying = false;
                audioNode.pause();
                updateVinylDiscUI(false);
                document.getElementById("mini-player").classList.add("hidden");
            }
            
            showToast("تم حذف الأغنية من مكتبتك بنجاح");
            updateFilteredTracks();
        }

        function changeLanguage(langCode) {
            state.lang = langCode;
            document.documentElement.lang = langCode;
            document.documentElement.dir = langCode === 'ar' ? 'rtl' : 'ltr';
            
            // Sync toggle language text
            const btn = document.getElementById("btn-lang-toggle");
            if (btn) btn.innerText = langCode === 'ar' ? "English" : "العربية";

            // Sync brand text
            const subtitle = document.getElementById("txt-app-subtitle");
            const ready = document.getElementById("txt-sys-ready");
            if (subtitle) subtitle.innerText = translations[langCode].app_subtitle;
            if (ready) ready.innerText = translations[langCode].sys_ready;

            const copy = document.getElementById("txt-footer-copy");
            if (copy) copy.innerText = translations[langCode].footer_copyright;

            showToast(translations[langCode].se_lang_changed);
            renderNavigationRail();
            renderActiveViewContent();
        }

        function toggleLang() {
            changeLanguage(state.lang === 'ar' ? 'en' : 'ar');
        }

        // PLAYLIST OPERATIONS
        function selectPlaylist(id) {
            state.activePlaylistId = id;
            renderActiveViewContent();
        }

        async function createPlaylist(name, desc) {
            const newPl = {
                id: "playlist_" + Date.now(),
                name,
                description: desc,
                trackIds: []
            };
            state.playlists.push(newPl);
            await dbSavePlaylist(newPl);
            selectPlaylist(newPl.id);
            showToast("✨ تم إنشاء قائمة التشغيل بنجاح");
        }

        async function deletePlaylist(id) {
            state.playlists = state.playlists.filter(p => p.id !== id);
            await dbDeletePlaylist(id);
            state.activePlaylistId = "all";
            renderActiveViewContent();
            showToast("تم حذف قائمة التشغيل");
        }

        async function removeTrackFromPlaylist(playlistId, trackId) {
            const pl = state.playlists.find(p => p.id === playlistId);
            if (!pl) return;
            pl.trackIds = pl.trackIds.filter(id => id !== trackId);
            await dbSavePlaylist(pl);
            renderActiveViewContent();
            showToast(translations[state.lang].toast_playlist_removed);
        }

        function playPlaylistDirectly(playlistId) {
            const pl = state.playlists.find(p => p.id === playlistId);
            if (!pl || !pl.trackIds.length) return;
            const firstTrack = state.tracks.find(t => t.id === pl.trackIds[0]);
            if (firstTrack) {
                playTrack(firstTrack);
                switchView("studio");
            }
        }

        // HARD RESET ALL DATA
        async function hardWipeAllData() {
            if (confirm("هل أنت متأكد من مسح جميع الملفات وقاعدة البيانات بالكامل؟")) {
                const req = indexedDB.deleteDatabase(DB_NAME);
                req.onsuccess = () => {
                    showToast(translations[state.lang].toast_db_cleared);
                    setTimeout(() => location.reload(), 1500);
                };
            }
        }

        // EQUALIZER BAND MODIFIER
        function changeEQBand(bandIdx, val) {
            initWebAudio();
            const dbVal = parseFloat(val);
            if (eqBands[bandIdx]) {
                eqBands[bandIdx].gain.setValueAtTime(dbVal, audioCtx.currentTime);
            }
            const labels = ["eq-bass-val", "eq-mid-val", "eq-treb-val"];
            const lbl = document.getElementById(labels[bandIdx]);
            if (lbl) lbl.innerText = `${dbVal > 0 ? '+' : ''}${dbVal}dB`;
        }

        function resetEqualizer() {
            const sliders = ["eq-bass-slider", "eq-mid-slider", "eq-treb-slider"];
            sliders.forEach((sl, idx) => {
                const el = document.getElementById(sl);
                if (el) {
                    el.value = idx === 0 ? 4 : idx === 1 ? 0 : 2;
                    changeEQBand(idx, el.value);
                }
            });
        }

        // LOCAL UPLOAD FILE INGESTION INTEGRATION
        async function handleMainFileImport(e) {
            const files = e.target.files;
            if (!files || !files.length) return;
            
            showToast("جاري استخراج الخواص وترسيخ الملفات محلياً...");
            let success = 0;
            
            for (let i = 0; i < files.length; i++) {
                const f = files[i];
                if (!f.type.startsWith("audio/")) continue;

                // Extract audio duration dynamically via safe temporary object
                const tempAudio = new Audio();
                const duration = await new Promise(res => {
                    tempAudio.addEventListener("loadedmetadata", () => res(tempAudio.duration));
                    tempAudio.addEventListener("error", () => res(180));
                    tempAudio.src = URL.createObjectURL(f);
                });
                URL.revokeObjectURL(tempAudio.src);

                const metadata = {
                    title: f.name.replace(/\.[^/.]+$/, ""),
                    artist: "مستورد محلياً",
                    album: "المكتبة الشخصية",
                    genre: "صوتيات",
                    duration: duration,
                    fileSize: f.size,
                    hasCover: false,
                    isFavorite: false,
                    playCount: 0,
                    lastPlayed: 0
                };

                await dbAddTrack(metadata, f, null);
                success++;
            }

            // Reload stores
            state.tracks = await dbGetTracks();
            updateFilteredTracks();
            showToast(`✨ تم استيراد ${success} ملفات بنجاح إلى مكتبتك!`);
            
            // Auto switch view to Library to see them!
            switchView("library");
        }

        // DIALOGS / MODALS CREATORS
        async function openEditTrackModal(id) {
            const track = state.tracks.find(t => t.id === id);
            if (!track) return;
            
            const title = prompt(state.lang === 'ar' ? 'عنوان الأغنية:' : 'Song Title:', track.title);
            if (title === null) return; // Cancelled
            
            const artist = prompt(state.lang === 'ar' ? 'اسم الفنان:' : 'Artist name:', track.artist || '');
            if (artist === null) return;
            
            const coverUrl = prompt(state.lang === 'ar' ? 'رابط صورة الغلاف (URL):' : 'Cover image URL:', track.coverUrl || '');
            if (coverUrl === null) return;
            
            track.title = title || track.title;
            track.artist = artist || track.artist;
            track.coverUrl = coverUrl || '';
            
            await dbUpdateTrack(id, { title: track.title, artist: track.artist, coverUrl: track.coverUrl });
            
            // Reload tracks and refresh
            state.tracks = await dbGetTracks();
            updateFilteredTracks();
            renderActiveViewContent();
            showToast(state.lang === 'ar' ? 'تم تعديل تفاصيل الأغنية والغلاف بنجاح!' : 'Track details updated successfully!');
        }

        // BACKGROUND MANAGEMENT FUNCTIONS
        function applyAppBackground(bgUrl) {
            state.appBgImage = bgUrl || '';
            dbSetSetting("appBgImage", state.appBgImage);
            
            const body = document.body;
            if (state.appBgImage) {
                body.style.backgroundImage = `url('${state.appBgImage}')`;
                body.style.backgroundSize = 'cover';
                body.style.backgroundPosition = 'center';
                body.style.backgroundAttachment = 'fixed';
            } else {
                body.style.backgroundImage = '';
            }
            const container = document.getElementById("primary-views-container");
            if (container) {
                renderActiveViewContent();
            }
        }

        function saveAppBgFromInput() {
            const el = document.getElementById("se-app-bg-url-input");
            if (el) {
                applyAppBackground(el.value.trim());
                showToast(state.lang === 'ar' ? 'تم حفظ خلفية البرنامج بنجاح!' : 'App background updated!');
            }
        }

        function handleAppBgUpload(event) {
            const file = event.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = function(e) {
                applyAppBackground(e.target.result);
                showToast(state.lang === 'ar' ? 'تم رفع وحفظ خلفية البرنامج بنجاح!' : 'App background uploaded & saved!');
            };
            reader.readAsDataURL(file);
        }

        function setPlayerBgStyle(style) {
            state.playerBgStyle = style;
            dbSetSetting("playerBgStyle", style);
            renderActiveViewContent();
            showToast(state.lang === 'ar' ? 'تم تغيير مظهر خلفية مشغل الأغاني!' : 'Player background style changed!');
        }

        function savePlayerCustomBgFromInput() {
            const el = document.getElementById("se-player-bg-url-input");
            if (el) {
                state.playerCustomBg = el.value.trim();
                dbSetSetting("playerCustomBg", state.playerCustomBg);
                renderActiveViewContent();
                showToast(state.lang === 'ar' ? 'تم حفظ مظهر المشغل المخصص!' : 'Custom player background saved!');
            }
        }

        function handlePlayerCustomBgUpload(event) {
            const file = event.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = function(e) {
                state.playerCustomBg = e.target.result;
                dbSetSetting("playerCustomBg", state.playerCustomBg);
                renderActiveViewContent();
                showToast(state.lang === 'ar' ? 'تم رفع وحفظ خلفية المشغل بنجاح!' : 'Player background uploaded & saved!');
            };
            reader.readAsDataURL(file);
        }
        function openCreatePlaylistModal() {
            const name = prompt(translations[state.lang].pl_label_name + ":", translations[state.lang].pl_placeholder_name);
            if (name) {
                const desc = prompt(translations[state.lang].pl_label_desc + ":", "");
                createPlaylist(name, desc);
            }
        }

        function openEditProfileModal() {
            const name = prompt(translations[state.lang].pr_input_name + ":", state.profile.name);
            if (name) {
                const bio = prompt(translations[state.lang].pr_input_bio + ":", state.profile.bio);
                const genre = prompt(translations[state.lang].pr_preferred_genre + ":", state.profile.preferredGenre);
                
                state.profile.name = name;
                state.profile.bio = bio || "";
                state.profile.preferredGenre = genre || "";
                
                dbSetSetting("user_profile", state.profile);
                renderActiveViewContent();
                showToast(translations[state.lang].toast_profile_saved);
            }
        }

        // INITIALIZATION SEQUENCE ON BOOTSTRAP
        async function appBootstrap() {
            await initDatabase();
            
            // Check settings from IndexedDB
            const savedTheme = await dbGetSetting("themePreset");
            if (savedTheme) {
                applyTheme(savedTheme);
            } else {
                applyTheme("spotify");
            }

            const savedDebug = await dbGetSetting("isDebugMode");
            if (savedDebug) {
                state.isDebugMode = true;
                const perf = document.getElementById("perf-indicator");
                if (perf) {
                    perf.classList.remove("hidden");
                    perf.classList.add("flex");
                }
            }

            const savedProfile = await dbGetSetting("user_profile");
            if (savedProfile) {
                state.profile = savedProfile;
            }

            // Load custom backgrounds from settings database
            const savedAppBg = await dbGetSetting("appBgImage");
            if (savedAppBg) {
                applyAppBackground(savedAppBg);
            }

            const savedPlayerStyle = await dbGetSetting("playerBgStyle");
            if (savedPlayerStyle) {
                state.playerBgStyle = savedPlayerStyle;
            } else {
                state.playerBgStyle = "blurred-cover";
            }

            const savedPlayerCustomBg = await dbGetSetting("playerCustomBg");
            if (savedPlayerCustomBg) {
                state.playerCustomBg = savedPlayerCustomBg;
            }

            // Load real files from user database
            const realTracks = await dbGetTracks();
            if (realTracks.length > 0) {
                state.tracks = realTracks;
            } else {
                // Seed default tracks as fallback so client is never empty!
                state.tracks = defaultTracks;
            }

            // Load custom playlists from user database
            const realPlaylists = await dbGetPlaylists();
            if (realPlaylists.length > 0) {
                state.playlists = realPlaylists;
            } else {
                // Seed a default playlist
                const samplePl = {
                    id: "sample_pl",
                    name: "موجات الصباح 🌅",
                    description: "أول الغيث الصوتي النقي",
                    trackIds: [-1, -3]
                };
                state.playlists = [samplePl];
                dbSavePlaylist(samplePl);
            }

            updateFilteredTracks();
            switchView("library");
            
            // Setup HTML5 canvas visualizer animation loop
            setupCanvasVisualizer();
        }

        // DYNAMIC WAVEFORM SPECTRUM HTML5 CANVAS RENDERING
        function setupCanvasVisualizer() {
            // Draw custom simulated ambient wave if music is not active or full web audio is loading
            const canvas = document.createElement("canvas");
            let animFrameId = null;
            
            function renderFrame() {
                animFrameId = requestAnimationFrame(renderFrame);
                const canvasElements = document.querySelectorAll("#st-visualizer-canvas");
                
                canvasElements.forEach(canvasEl => {
                    const ctx = canvasEl.getContext("2d");
                    const width = canvasEl.width = canvasEl.parentElement.clientWidth;
                    const height = canvasEl.height = canvasEl.parentElement.clientHeight;
                    
                    ctx.fillStyle = "rgba(18, 20, 28, 0.5)";
                    ctx.fillRect(0, 0, width, height);

                    if (state.isPlaying && analyser) {
                        const bufferLength = analyser.frequencyBinCount;
                        const dataArray = new Uint8Array(bufferLength);
                        analyser.getByteFrequencyData(dataArray);

                        const barWidth = (width / bufferLength) * 2.5;
                        let barHeight;
                        let x = 0;

                        for (let i = 0; i < bufferLength; i++) {
                            barHeight = dataArray[i] / 1.5;
                            
                            // Color spectrum gradient matched to accent theme
                            ctx.fillStyle = state.accentColor + "cc";
                            ctx.fillRect(x, height - barHeight, barWidth - 1, barHeight);
                            x += barWidth;
                        }
                    } else if (state.isPlaying) {
                        // Dynamic synthetic pulse wave if using mock synthetic track
                        const time = Date.now() * 0.005;
                        ctx.beginPath();
                        ctx.lineWidth = 2.5;
                        ctx.strokeStyle = state.accentColor;
                        for (let i = 0; i < width; i++) {
                            const y = height / 2 + Math.sin(i * 0.04 + time) * 15 * Math.sin(i * 0.005);
                            if (i === 0) ctx.moveTo(i, y);
                            else ctx.lineTo(i, y);
                        }
                        ctx.stroke();
                    } else {
                        // Flat line
                        ctx.beginPath();
                        ctx.lineWidth = 1.5;
                        ctx.strokeStyle = "rgba(255, 255, 255, 0.06)";
                        ctx.moveTo(0, height / 2);
                        ctx.lineTo(width, height / 2);
                        ctx.stroke();
                    }
                });
            }
            renderFrame();
        }

        // Drag and drop events setup for central import page
        window.addEventListener("dragover", e => e.preventDefault());
        window.addEventListener("drop", e => e.preventDefault());

        // Bootstrapping
        window.addEventListener("DOMContentLoaded", () => {
            appBootstrap();
        });
    </script>
